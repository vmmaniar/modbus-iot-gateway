# Telegraf — subscribes to MQTT telemetry, base64-decodes the CBOR payload,
# and writes points to InfluxDB.
#
# Why a custom processor? Telegraf doesn't ship a CBOR parser, but it can
# execute external scripts via the `[[processors.execd]]` plugin. The simpler
# path used here: the Python producer publishes a JSON twin of the CBOR record
# on a parallel topic for easy ingest, while the binary CBOR topic remains for
# protocol-correctness demonstration.

[agent]
  interval = "1s"
  flush_interval = "5s"
  hostname = "telegraf-modbus"
  omit_hostname = false

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["iot/+/telemetry/json"]
  data_format = "json"
  qos = 0
  client_id = "telegraf-modbus-gateway"
  json_string_fields = ["label"]
  tag_keys = ["label", "slave"]

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "maniar"
  bucket = "gateway"
