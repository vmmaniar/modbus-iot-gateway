# Mosquitto 2.x configuration.
# Plaintext on 1883 for local development; TLS on 8883 for the AWS-IoT-equivalent
# path. Real AWS IoT requires per-device X.509 certs — exactly what the TLS
# listener below models.

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Listener 1: plaintext (loopback / dev only)
listener 1883
protocol mqtt
allow_anonymous true

# Listener 2: TLS with mutual auth (production-equivalent path)
# Note: certs in this repo are SELF-SIGNED for local development. Regenerate
# via docker/mosquitto/certs/init-certs.sh before first run.
listener 8883
protocol mqtt
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
require_certificate true
use_identity_as_username true
